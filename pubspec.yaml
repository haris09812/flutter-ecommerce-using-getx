name: Arccessory
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.7.2


dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.3.2

  ## -- STATE MANAGEMENT
  get: ^4.7.3
  get_storage: ^2.1.1

  ## -- OnBoarding PACKAGES
  liquid_swipe: ^3.1.0
  smooth_page_indicator: ^1.2.1

  ## -- OTP TEXT FIELD PACKAGE
  otp_text_field: ^1.1.3
  flutter_otp_text_field: ^1.1.1

  ## -- FIREBASE PACKAGES
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  google_sign_in: ^6.3.0
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.0.4
  firebase_crashlytics: ^5.0.5


  ## -- ICON PACKAGES
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8
  line_awesome_flutter: ^3.0.1

  ## -- Utility PACKAGES
  intl: ^0.20.2
  logger: ^2.6.2
  lottie: ^3.3.2
  badges: ^3.1.2
  shimmer: ^3.0.0
  readmore: ^3.0.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  carousel_slider: ^5.1.1
  flutter_rating_bar: ^4.0.1
  connectivity_plus: ^7.0.0
  country_code_picker: ^3.4.1
  flutter_native_splash: ^2.4.6

  # Notification
  flutter_local_notifications: ^19.2.1

  supabase_flutter: ^2.9.0


  http: any
  flutter_launcher_icons: ^0.14.4
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/arccessory_app_icon.png"
  adaptive_icon_background: "#000000"

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/
    - assets/icons/brands/
    - assets/images/profile/
    - assets/images/dashboard/
    - assets/images/splash_images/
    - assets/images/welcome_images/
    - assets/images/forget_password/
    - assets/images/on_boarding_images/
    - assets/images/animations/
    - assets/images/banners/
    - assets/icons/payment_methods/
    - assets/images/products/
    - assets/images/brands/
    - assets/icons/categories/
    - assets/icons/payment_methods/paypal.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
